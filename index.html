<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVault — Movies & TV Library</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #18181b;
      --surface2: #232329;
      --border: #2e2e36;
      --accent: #5865f2;
      --accent-hover: #4752c4;
      --text: #f0f0f5;
      --text-muted: #8b8b9e;
      --star: #f5c518;
      --danger: #ef4444;
      --radius: 12px;
      --transition: .2s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; font-family: inherit; }
    img { display: block; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }

    /* ===== NAVBAR ===== */
    #navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,15,.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #logo {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -.5px;
      white-space: nowrap;
      color: var(--text);
    }

    #logo span { color: var(--accent); }

    #search-form {
      flex: 1;
      max-width: 520px;
      display: flex;
      gap: 8px;
    }

    #search-input {
      flex: 1;
      padding: 9px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9999px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color var(--transition);
    }

    #search-input::placeholder { color: var(--text-muted); }
    #search-input:focus { border-color: var(--accent); }

    #search-btn {
      padding: 9px 20px;
      background: var(--accent);
      color: #fff;
      border-radius: 9999px;
      font-size: .9rem;
      font-weight: 600;
      transition: background var(--transition), transform var(--transition);
    }

    #search-btn:hover { background: var(--accent-hover); transform: scale(1.03); }

    #api-key-btn {
      margin-left: auto;
      padding: 8px 16px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-size: .85rem;
      white-space: nowrap;
      transition: color var(--transition), border-color var(--transition);
    }

    #api-key-btn:hover { color: var(--text); border-color: var(--accent); }
    #api-key-btn.active { color: #4ade80; border-color: #4ade80; }

    /* ===== MAIN ===== */
    #main { padding: 32px 24px; max-width: 1400px; margin: 0 auto; }

    /* ===== SECTION HEADER ===== */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .section-badge {
      padding: 3px 10px;
      background: var(--accent);
      color: #fff;
      border-radius: 9999px;
      font-size: .75rem;
      font-weight: 600;
    }

    /* ===== TABS ===== */
    #tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 10px 18px;
      background: none;
      color: var(--text-muted);
      font-size: .9rem;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: color var(--transition), border-color var(--transition);
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ===== GRID ===== */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }

    /* ===== MOVIE CARD ===== */
    .movie-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      position: relative;
    }

    .movie-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(88,101,242,.25);
    }

    .movie-card .poster-wrap {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--surface2);
    }

    .movie-card .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .35s ease;
    }

    .movie-card:hover .poster-wrap img { transform: scale(1.06); }

    .movie-card .no-poster {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--text-muted);
    }

    .movie-card .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .movie-card:hover .play-overlay { opacity: 1; }

    .play-icon {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-icon svg { margin-left: 4px; }

    .movie-card .card-info {
      padding: 12px;
    }

    .movie-card .card-title {
      font-size: .88rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .movie-card .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .78rem;
      color: var(--text-muted);
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 3px;
      color: var(--star);
      font-weight: 700;
      font-size: .82rem;
    }

    .rating svg { flex-shrink: 0; }

    /* ===== EMPTY / LOADING / ERROR STATES ===== */
    .state-box {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .state-box .icon { font-size: 3rem; margin-bottom: 12px; }
    .state-box p { font-size: 1rem; margin-bottom: 6px; }
    .state-box small { font-size: .85rem; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== LOAD MORE ===== */
    #load-more-wrap {
      text-align: center;
      margin-top: 36px;
    }

    #load-more-btn {
      padding: 12px 36px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-size: .95rem;
      font-weight: 600;
      transition: background var(--transition), border-color var(--transition);
    }

    #load-more-btn:hover { background: var(--surface); border-color: var(--accent); }

    /* ===== MODAL OVERLAY ===== */
    #modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    #modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== MODAL BOX ===== */
    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 860px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      transform: translateY(20px) scale(.97);
      transition: transform .25s ease;
    }

    #modal-overlay.open #modal {
      transform: translateY(0) scale(1);
    }

    #modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 10;
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1.1rem;
      transition: color var(--transition), background var(--transition);
    }

    #modal-close:hover { color: var(--text); background: var(--border); }

    /* ===== MODAL HERO ===== */
    #modal-hero {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 18px 18px 0 0;
      overflow: hidden;
    }

    #modal-hero iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #modal-hero-poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #modal-play-btn {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.45);
      transition: background var(--transition);
    }

    #modal-play-btn:hover { background: rgba(0,0,0,.3); }

    #modal-play-btn .play-big {
      width: 72px;
      height: 72px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 12px rgba(88,101,242,.25);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    #modal-play-btn:hover .play-big {
      transform: scale(1.08);
      box-shadow: 0 0 0 18px rgba(88,101,242,.18);
    }

    /* ===== MODAL BODY ===== */
    #modal-body {
      display: flex;
      gap: 24px;
      padding: 24px;
    }

    #modal-poster {
      width: 140px;
      flex-shrink: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      align-self: flex-start;
      margin-top: -60px;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 24px rgba(0,0,0,.6);
    }

    #modal-poster img { width: 100%; display: block; }

    #modal-info { flex: 1; min-width: 0; }

    #modal-title {
      font-size: 1.55rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    #modal-tagline {
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-size: .9rem;
    }

    #modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-pill {
      padding: 4px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-size: .8rem;
      color: var(--text-muted);
    }

    .meta-pill.accent { background: rgba(88,101,242,.2); border-color: var(--accent); color: var(--accent); }

    #modal-overview {
      font-size: .9rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    #modal-genres {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .genre-tag {
      padding: 4px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-size: .78rem;
    }

    #modal-watch-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      background: var(--accent);
      color: #fff;
      border-radius: 9999px;
      font-size: .95rem;
      font-weight: 700;
      transition: background var(--transition), transform var(--transition);
    }

    #modal-watch-btn:hover { background: var(--accent-hover); transform: scale(1.03); }

    #tv-controls {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    #tv-controls label {
      font-size: .82rem;
      color: var(--text-muted);
    }

    .tv-input {
      width: 76px;
      padding: 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .88rem;
    }

    /* ===== API KEY MODAL ===== */
    #apikey-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    #apikey-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    #apikey-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      width: 100%;
      max-width: 440px;
      transform: translateY(16px) scale(.97);
      transition: transform .25s ease;
    }

    #apikey-overlay.open #apikey-modal {
      transform: translateY(0) scale(1);
    }

    #apikey-modal h2 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    #apikey-modal p {
      color: var(--text-muted);
      font-size: .9rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    #apikey-modal a { color: var(--accent); text-decoration: underline; }

    #apikey-input {
      width: 100%;
      padding: 11px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      margin-bottom: 14px;
      transition: border-color var(--transition);
      font-family: monospace;
    }

    #apikey-input::placeholder { color: var(--text-muted); font-family: inherit; }
    #apikey-input:focus { border-color: var(--accent); }

    #apikey-error {
      color: var(--danger);
      font-size: .82rem;
      margin-bottom: 12px;
      display: none;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-secondary {
      padding: 10px 20px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 9999px;
      font-size: .9rem;
      font-weight: 600;
      transition: color var(--transition), border-color var(--transition);
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--accent); }

    .btn-primary {
      padding: 10px 22px;
      background: var(--accent);
      color: #fff;
      border-radius: 9999px;
      font-size: .9rem;
      font-weight: 700;
      transition: background var(--transition);
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 400;
      padding: 12px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: .88rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transform: translateY(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease, transform .3s ease;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: #4ade80; color: #4ade80; }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      #navbar { flex-wrap: wrap; height: auto; padding: 12px 16px; gap: 10px; }
      #logo { font-size: 1.2rem; }
      #search-form { order: 3; width: 100%; max-width: none; }
      #api-key-btn { margin-left: 0; }

      #modal-body { flex-direction: column; }
      #modal-poster { width: 100px; margin-top: -50px; }
      #modal-title { font-size: 1.2rem; }

      .movies-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav id="navbar">
    <div id="logo">Cine<span>Vault</span></div>

    <form id="search-form" autocomplete="off">
      <input id="search-input" type="search" placeholder="Search movies or TV…" />
      <button id="search-btn" type="submit">Search</button>
    </form>

    <button id="api-key-btn" title="Set your TMDB API key">🔑 API Key</button>
  </nav>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main">
    <div id="tabs">
      <button class="tab-btn active" data-tab="trending">🔥 Trending</button>
      <button class="tab-btn" data-tab="popular">⭐ Popular</button>
      <button class="tab-btn" data-tab="toprated">🏆 Top Rated</button>
      <button class="tab-btn" data-tab="tvtrending">📺 TV Trending</button>
      <button class="tab-btn" data-tab="tvpopular">📡 TV Popular</button>
      <button class="tab-btn" data-tab="tvtoprated">🎬 TV Top Rated</button>
      <button class="tab-btn" data-tab="search" id="search-tab" style="display:none;">🔍 Results</button>
    </div>

    <div class="section-header">
      <h2 class="section-title" id="section-title">Trending Today</h2>
      <span class="section-badge" id="result-count" style="display:none;"></span>
    </div>

    <div class="movies-grid" id="movies-grid"></div>

    <div id="load-more-wrap" style="display:none;">
      <button id="load-more-btn">Load More</button>
    </div>
  </main>

  <!-- ===== MOVIE DETAIL MODAL ===== -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <button id="modal-close" aria-label="Close">✕</button>

      <div id="modal-hero">
        <img id="modal-hero-poster" src="" alt="" />
        <button id="modal-play-btn" aria-label="Watch trailer">
          <span class="play-big">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </span>
        </button>
      </div>

      <div id="modal-body">
        <div id="modal-poster">
          <img id="modal-poster-img" src="" alt="" />
        </div>

        <div id="modal-info">
          <h2 id="modal-title"></h2>
          <p id="modal-tagline"></p>
          <div id="modal-meta"></div>
          <p id="modal-overview"></p>
          <div id="modal-genres"></div>
          <button id="modal-watch-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            Watch Now
          </button>
          <div id="tv-controls">
            <label for="season-input">Season</label>
            <input id="season-input" class="tv-input" type="number" min="1" value="1" />
            <label for="episode-input">Episode</label>
            <input id="episode-input" class="tv-input" type="number" min="1" value="1" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== API KEY MODAL ===== -->
  <div id="apikey-overlay" role="dialog" aria-modal="true">
    <div id="apikey-modal">
      <h2>🔑 TMDB API Key</h2>
      <p>
        To search movies and load posters, enter your free TMDB API key below.<br><br>
        Don't have one? <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">Get it free at themoviedb.org →</a>
      </p>
      <input id="apikey-input" type="text" placeholder="Enter your TMDB API key…" />
      <div id="apikey-error">Invalid API key — please check and try again.</div>
      <div class="modal-actions">
        <button class="btn-secondary" id="apikey-cancel">Cancel</button>
        <button class="btn-primary" id="apikey-save">Save Key</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast"></div>

  <script>
    /* ============================================================
       CONSTANTS & STATE
    ============================================================ */
    const TMDB_BASE   = 'https://api.themoviedb.org/3';
    const IMG_BASE    = 'https://image.tmdb.org/t/p';
    const EMBED_MOVIE_BASE = 'https://www.vidking.net/embed/movie';
    const EMBED_TV_BASE    = 'https://www.vidking.net/embed/tv';
    const ACCENT_HEX  = '5865f2';

    const state = {
      apiKey: localStorage.getItem('tmdb_api_key') || '',
      currentTab: 'trending',
      query: '',
      page: 1,
      totalPages: 1,
      loading: false,
      currentMediaId: null,
      currentMediaType: 'movie',
    };

    /* ============================================================
       DOM REFS
    ============================================================ */
    const grid           = document.getElementById('movies-grid');
    const loadMoreWrap   = document.getElementById('load-more-wrap');
    const loadMoreBtn    = document.getElementById('load-more-btn');
    const sectionTitle   = document.getElementById('section-title');
    const resultCount    = document.getElementById('result-count');
    const tabs           = document.querySelectorAll('.tab-btn');
    const searchTab      = document.getElementById('search-tab');
    const searchForm     = document.getElementById('search-form');
    const searchInput    = document.getElementById('search-input');
    const apiKeyBtn      = document.getElementById('api-key-btn');

    const modalOverlay   = document.getElementById('modal-overlay');
    const modalClose     = document.getElementById('modal-close');
    const modalHero      = document.getElementById('modal-hero');
    const modalHeroPoster= document.getElementById('modal-hero-poster');
    const modalPlayBtn   = document.getElementById('modal-play-btn');
    const modalPosterImg = document.getElementById('modal-poster-img');
    const modalTitle     = document.getElementById('modal-title');
    const modalTagline   = document.getElementById('modal-tagline');
    const modalMeta      = document.getElementById('modal-meta');
    const modalOverview  = document.getElementById('modal-overview');
    const modalGenres    = document.getElementById('modal-genres');
    const modalWatchBtn  = document.getElementById('modal-watch-btn');
    const tvControls     = document.getElementById('tv-controls');
    const seasonInput    = document.getElementById('season-input');
    const episodeInput   = document.getElementById('episode-input');

    const apikeyOverlay  = document.getElementById('apikey-overlay');
    const apikeyInput    = document.getElementById('apikey-input');
    const apikeyError    = document.getElementById('apikey-error');
    const apikeySave     = document.getElementById('apikey-save');
    const apikeyCancel   = document.getElementById('apikey-cancel');

    const toast          = document.getElementById('toast');

    /* ============================================================
       UTILITY
    ============================================================ */
    function showToast(msg, type = 'info', duration = 3000) {
      toast.textContent = msg;
      toast.className = 'show ' + type;
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { toast.className = ''; }, duration);
    }

    function imgUrl(path, size = 'w342') {
      return path ? `${IMG_BASE}/${size}${path}` : null;
    }

    function formatDate(str) {
      if (!str) return '—';
      const d = new Date(str);
      return isNaN(d) ? str : d.getFullYear();
    }

    function formatRating(v) {
      return v ? (+v).toFixed(1) : '—';
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    /* ============================================================
       API KEY MANAGEMENT
    ============================================================ */
    function updateApiKeyBtn() {
      if (state.apiKey) {
        apiKeyBtn.textContent = '🔑 Key Set';
        apiKeyBtn.classList.add('active');
      } else {
        apiKeyBtn.textContent = '🔑 API Key';
        apiKeyBtn.classList.remove('active');
      }
    }

    function openApiKeyModal() {
      apikeyInput.value = state.apiKey || '';
      apikeyError.style.display = 'none';
      apikeyOverlay.classList.add('open');
      setTimeout(() => apikeyInput.focus(), 50);
    }

    function closeApiKeyModal() {
      apikeyOverlay.classList.remove('open');
    }

    apiKeyBtn.addEventListener('click', openApiKeyModal);
    apikeyCancel.addEventListener('click', closeApiKeyModal);

    apikeyOverlay.addEventListener('click', e => {
      if (e.target === apikeyOverlay) closeApiKeyModal();
    });

    apikeySave.addEventListener('click', async () => {
      const key = apikeyInput.value.trim();
      if (!key) {
        apikeyError.textContent = 'Please enter an API key.';
        apikeyError.style.display = 'block';
        return;
      }
      apikeySave.disabled = true;
      apikeySave.textContent = 'Validating…';
      const valid = await validateApiKey(key);
      apikeySave.disabled = false;
      apikeySave.textContent = 'Save Key';
      if (valid) {
        state.apiKey = key;
        localStorage.setItem('tmdb_api_key', key);
        updateApiKeyBtn();
        closeApiKeyModal();
        showToast('API key saved! Loading movies…', 'success');
        loadTab(state.currentTab, true);
      } else {
        apikeyError.textContent = 'Invalid API key — please check and try again.';
        apikeyError.style.display = 'block';
      }
    });

    apikeyInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') apikeySave.click();
    });

    async function validateApiKey(key) {
      try {
        const res = await fetch(`${TMDB_BASE}/configuration?api_key=${encodeURIComponent(key)}`);
        return res.ok;
      } catch {
        return false;
      }
    }

    /* ============================================================
       TMDB FETCH HELPERS
    ============================================================ */
    async function tmdbFetch(endpoint, params = {}) {
      if (!state.apiKey) return null;
      const url = new URL(`${TMDB_BASE}${endpoint}`);
      url.searchParams.set('api_key', state.apiKey);
      for (const [k, v] of Object.entries(params)) {
        url.searchParams.set(k, v);
      }
      const res = await fetch(url.toString());
      if (!res.ok) throw new Error(`TMDB ${res.status}`);
      return res.json();
    }

    async function fetchMedia(tab, page = 1) {
      if (tab === 'trending')   return tmdbFetch('/trending/movie/day', { page });
      if (tab === 'popular')    return tmdbFetch('/movie/popular', { page });
      if (tab === 'toprated')   return tmdbFetch('/movie/top_rated', { page });
      if (tab === 'tvtrending') return tmdbFetch('/trending/tv/day', { page });
      if (tab === 'tvpopular')  return tmdbFetch('/tv/popular', { page });
      if (tab === 'tvtoprated') return tmdbFetch('/tv/top_rated', { page });
      if (tab === 'search')     return tmdbFetch('/search/multi', { query: state.query, page });
      return null;
    }

    async function fetchMediaDetails(id, type = 'movie') {
      const endpoint = type === 'tv' ? `/tv/${id}` : `/movie/${id}`;
      return tmdbFetch(endpoint);
    }

    /* ============================================================
       RENDER HELPERS
    ============================================================ */
    function normalizeMedia(item, fallbackType = 'movie') {
      return {
        ...item,
        media_type: item.media_type || fallbackType,
        media_title: item.title || item.name || 'Untitled',
        media_date: item.release_date || item.first_air_date || '',
      };
    }

    function mediaTypeForTab(tab) {
      return tab.startsWith('tv') ? 'tv' : 'movie';
    }

    function renderCard(media) {
      const poster = imgUrl(media.poster_path, 'w342');
      const year   = formatDate(media.media_date);
      const rating = formatRating(media.vote_average);
      const title  = media.media_title;

      const card = document.createElement('div');
      card.className = 'movie-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${title} (${year})`);

      card.innerHTML = `
        <div class="poster-wrap">
          ${poster
            ? `<img src="${escHtml(poster)}" alt="${escHtml(title)} poster" loading="lazy" />`
            : `<div class="no-poster">🎬</div>`
          }
          <div class="play-overlay">
            <div class="play-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        </div>
        <div class="card-info">
          <p class="card-title">${escHtml(title)}</p>
          <div class="card-meta">
            <div class="rating">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              ${escHtml(rating)}
            </div>
            <span>${escHtml(String(year))}</span>
          </div>
        </div>
      `;

      const open = () => openMediaModal(media.id, media.media_type);
      card.addEventListener('click', open);
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });

      return card;
    }

    function renderLoading() {
      grid.innerHTML = `
        <div class="state-box">
          <div class="spinner"></div>
          <p>Loading movies…</p>
        </div>
      `;
      loadMoreWrap.style.display = 'none';
    }

    function renderNoKey() {
      grid.innerHTML = `
        <div class="state-box">
          <div class="icon">🔑</div>
          <p>No API key set.</p>
          <small>Click <strong>API Key</strong> in the top-right to add your free TMDB key.</small>
        </div>
      `;
      loadMoreWrap.style.display = 'none';
    }

    function renderEmpty(msg = 'No movies found.') {
      grid.innerHTML = `
        <div class="state-box">
          <div class="icon">🎭</div>
          <p>${escHtml(msg)}</p>
        </div>
      `;
      loadMoreWrap.style.display = 'none';
    }

    function renderError(msg = 'Something went wrong.') {
      grid.innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <p>${escHtml(msg)}</p>
          <small>Please check your API key or try again later.</small>
        </div>
      `;
      loadMoreWrap.style.display = 'none';
    }

    /* ============================================================
       LOAD TAB
    ============================================================ */
    const TITLES = {
      trending: 'Trending Today',
      popular:  'Popular Movies',
      toprated: 'Top Rated Movies',
      tvtrending: 'Trending TV Series',
      tvpopular: 'Popular TV Series',
      tvtoprated: 'Top Rated TV Series',
      search:   'Search Results',
    };

    async function loadTab(tab, reset = false) {
      if (!state.apiKey) { renderNoKey(); return; }
      if (state.loading) return;

      state.loading = true;
      if (reset) { state.page = 1; state.totalPages = 1; }

      if (reset) renderLoading();

      sectionTitle.textContent = tab === 'search'
        ? `Results for "${state.query}"`
        : TITLES[tab];

      try {
        const data = await fetchMedia(tab, state.page);
        if (!data) { renderNoKey(); state.loading = false; return; }

        const rawItems = data.results || [];
        const items = rawItems
          .filter(i => tab !== 'search' || i.media_type === 'movie' || i.media_type === 'tv')
          .map(i => normalizeMedia(i, tab === 'search' ? 'movie' : mediaTypeForTab(tab)));
        state.totalPages = data.total_pages || 1;

        if (tab === 'search') {
          const total = data.total_results || 0;
          resultCount.textContent = `${total.toLocaleString()} results`;
          resultCount.style.display = total > 0 ? '' : 'none';
        } else {
          resultCount.style.display = 'none';
        }

        if (reset) grid.innerHTML = '';

        if (items.length === 0 && reset) {
          renderEmpty(tab === 'search' ? `No results for "${state.query}".` : 'Nothing to show right now.');
          state.loading = false;
          return;
        }

        const frag = document.createDocumentFragment();
        items.forEach(m => frag.appendChild(renderCard(m)));
        grid.appendChild(frag);

        loadMoreWrap.style.display = state.page < state.totalPages ? '' : 'none';
      } catch (err) {
        if (reset) renderError(err.message || 'Failed to load movies.');
      } finally {
        state.loading = false;
      }
    }

    /* ============================================================
       TABS
    ============================================================ */
    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        if (tab === 'search' && !state.query) return;
        setActiveTab(tab);
        loadTab(tab, true);
      });
    });

    function setActiveTab(tab) {
      state.currentTab = tab;
      tabs.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    }

    /* ============================================================
       SEARCH
    ============================================================ */
    searchForm.addEventListener('submit', e => {
      e.preventDefault();
      const q = searchInput.value.trim();
      if (!q) return;
      if (!state.apiKey) { openApiKeyModal(); return; }
      state.query = q;
      searchTab.style.display = '';
      setActiveTab('search');
      loadTab('search', true);
    });

    /* ============================================================
       LOAD MORE
    ============================================================ */
    loadMoreBtn.addEventListener('click', () => {
      state.page += 1;
      loadTab(state.currentTab);
    });

    /* ============================================================
       MOVIE DETAIL MODAL
    ============================================================ */
    async function openMediaModal(id, type = 'movie') {
      state.currentMediaId = id;
      state.currentMediaType = type;
      tvControls.style.display = type === 'tv' ? 'flex' : 'none';
      modalWatchBtn.innerHTML = type === 'tv'
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Watch Episode'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Watch Trailer';

      // Reset hero to poster view
      resetModalHero();

      // Open overlay immediately (skeleton while loading)
      modalTitle.textContent = 'Loading…';
      modalTagline.textContent = '';
      modalMeta.innerHTML = '';
      modalOverview.textContent = '';
      modalGenres.innerHTML = '';
      seasonInput.value = '1';
      episodeInput.value = '1';
      modalPosterImg.src = '';
      modalHeroPoster.src = '';
      modalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      try {
        const media = await fetchMediaDetails(id, type);
        if (!media) return;

        const mediaTitle = media.title || media.name || 'Untitled';

        // Hero backdrop
        const backdrop = imgUrl(media.backdrop_path, 'w1280');
        if (backdrop) { modalHeroPoster.src = backdrop; modalHeroPoster.alt = mediaTitle; }

        // Side poster
        const poster = imgUrl(media.poster_path, 'w342');
        if (poster) { modalPosterImg.src = poster; modalPosterImg.alt = mediaTitle + ' poster'; }

        // Info
        modalTitle.textContent = mediaTitle;
        modalTagline.textContent = media.tagline || '';
        modalTagline.style.display = media.tagline ? '' : 'none';

        const dateValue = media.release_date || media.first_air_date;
        const year    = formatDate(dateValue);
        const rating  = formatRating(media.vote_average);
        const runtime = media.runtime
          ? `${media.runtime} min`
          : (Array.isArray(media.episode_run_time) && media.episode_run_time[0]
            ? `${media.episode_run_time[0]} min/ep`
            : null);

        const seasonCount = media.number_of_seasons || 1;
        seasonInput.max = String(Math.max(1, seasonCount));

        modalMeta.innerHTML = [
          `<span class="meta-pill accent">⭐ ${escHtml(rating)}</span>`,
          year !== '—' ? `<span class="meta-pill">📅 ${escHtml(String(year))}</span>` : '',
          runtime       ? `<span class="meta-pill">⏱ ${escHtml(runtime)}</span>` : '',
          media.status  ? `<span class="meta-pill">${escHtml(media.status)}</span>` : '',
          type === 'tv' ? `<span class="meta-pill">📺 ${escHtml(String(seasonCount))} seasons</span>` : '',
        ].filter(Boolean).join('');

        modalOverview.textContent = media.overview || 'No overview available.';

        const genres = (media.genres || []).map(g => `<span class="genre-tag">${escHtml(g.name)}</span>`).join('');
        modalGenres.innerHTML = genres;

      } catch {
        modalTitle.textContent = 'Failed to load details.';
      }
    }

    function resetModalHero() {
      // Remove any existing iframe
      const existing = modalHero.querySelector('iframe');
      if (existing) existing.remove();
      modalHeroPoster.style.display = '';
      modalPlayBtn.style.display = '';
    }

    function loadTrailerEmbed() {
      const id = state.currentMediaId;
      if (!id) return;

      const mediaType = state.currentMediaType || 'movie';
      const season = Math.max(1, parseInt(seasonInput.value, 10) || 1);
      const episode = Math.max(1, parseInt(episodeInput.value, 10) || 1);

      // Hide poster + play button
      modalHeroPoster.style.display = 'none';
      modalPlayBtn.style.display = 'none';

      // Remove old iframe if any
      const old = modalHero.querySelector('iframe');
      if (old) old.remove();

      // Create iframe
      const iframe = document.createElement('iframe');
      iframe.src = mediaType === 'tv'
        ? `${EMBED_TV_BASE}/${id}/${season}/${episode}?color=${ACCENT_HEX}`
        : `${EMBED_MOVIE_BASE}/${id}?color=${ACCENT_HEX}`;
      iframe.setAttribute('allowfullscreen', '');
      iframe.setAttribute('referrerpolicy', 'no-referrer');
      iframe.allow = 'autoplay; fullscreen; picture-in-picture';
      iframe.title = mediaType === 'tv' ? 'TV episode player' : 'Movie trailer';
      modalHero.appendChild(iframe);
    }

    // Play button inside hero poster
    modalPlayBtn.addEventListener('click', loadTrailerEmbed);

    // "Watch Trailer" button in details area
    modalWatchBtn.addEventListener('click', () => {
      loadTrailerEmbed();
      // Scroll to top of modal
      document.getElementById('modal').scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Close modal
    function closeModal() {
      modalOverlay.classList.remove('open');
      document.body.style.overflow = '';
      // Stop iframe on close
      const iframe = modalHero.querySelector('iframe');
      if (iframe) iframe.remove();
      modalHeroPoster.style.display = '';
      modalPlayBtn.style.display = '';
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.activeElement.tagName !== 'INPUT') {
        if (apikeyOverlay.classList.contains('open')) closeApiKeyModal();
        else if (modalOverlay.classList.contains('open')) closeModal();
      }
    });

    /* ============================================================
       BOOT
    ============================================================ */
    updateApiKeyBtn();

    if (state.apiKey) {
      loadTab('trending', true);
    } else {
      renderNoKey();
      // Auto-open API key modal on first visit
      setTimeout(openApiKeyModal, 400);
    }
  </script>
</body>
</html>
